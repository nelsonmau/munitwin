<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuniTwin AI — Millbrook Demo</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem('munitwin-theme') || 'light';</script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body class="t-bg-base t-text antialiased flex flex-col h-screen">

  <!-- NAV -->
  <nav class="h-14 t-bg-surface border-b t-border flex items-center px-4 gap-3 flex-shrink-0 z-50">
    <a href="index.html" class="nav-action">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="h-5 w-px t-divider"></div>
    <a href="./" class="font-bold text-sm tracking-wide t-text hover:text-blue-500 transition-colors">MUNITWIN <span class="text-blue-500">AI</span></a>
    <span class="t-text-sec text-sm">·</span>
    <span class="text-sm">Millbrook</span>
    <span class="t-text-sec text-sm">·</span>
    <span class="text-xs t-text-sec">Demo</span>

    <div class="ml-auto flex items-center gap-4">
      <!-- Legend -->
      <div class="hidden sm:flex items-center gap-4 text-xs t-text-sec">
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-red-600 inline-block"></span>Critical
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span>Warning
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block"></span>OK
        </span>
      </div>
      <!-- Theme toggle -->
      <button class="theme-toggle" title="Toggle light / dark">
        <svg class="icon-moon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="icon-sun w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="flex flex-1 overflow-hidden">

    <!-- MAP -->
    <div id="map" class="flex-1"></div>

    <!-- SIDEBAR -->
    <aside class="w-80 flex-shrink-0 t-bg-surface border-l t-border flex flex-col overflow-hidden">
      <div class="sidebar-scroll flex-1 overflow-y-auto">

        <!-- Summary -->
        <div class="p-4 border-b t-border">
          <div class="text-xs font-semibold uppercase tracking-widest t-text-sec mb-3">Asset status</div>
          <div class="grid grid-cols-3 gap-2">
            <div class="t-bg-base rounded p-2.5 text-center">
              <div id="count-critical" class="text-xl font-bold text-red-600">—</div>
              <div class="text-[10px] t-text-sec uppercase tracking-wide mt-0.5">Critical</div>
            </div>
            <div class="t-bg-base rounded p-2.5 text-center">
              <div id="count-warning" class="text-xl font-bold text-amber-500">—</div>
              <div class="text-[10px] t-text-sec uppercase tracking-wide mt-0.5">Warning</div>
            </div>
            <div class="t-bg-base rounded p-2.5 text-center">
              <div id="count-ok" class="text-xl font-bold text-emerald-500">—</div>
              <div class="text-[10px] t-text-sec uppercase tracking-wide mt-0.5">OK</div>
            </div>
          </div>
        </div>

        <!-- Status filter -->
        <div class="p-4 border-b t-border">
          <div class="text-xs font-semibold uppercase tracking-widest t-text-sec mb-3">Filter by status</div>
          <div class="flex gap-2">
            <button data-status="all"
              class="flex-1 text-xs py-1.5 rounded t-btn-ghost filter-active">
              All
            </button>
            <button data-status="critical"
              class="flex-1 text-xs py-1.5 rounded border border-red-600/30 text-red-600 hover:border-red-600 transition-colors">
              Critical
            </button>
            <button data-status="warning"
              class="flex-1 text-xs py-1.5 rounded border border-amber-500/30 text-amber-500 hover:border-amber-500 transition-colors">
              Warning
            </button>
            <button data-status="ok"
              class="flex-1 text-xs py-1.5 rounded border border-emerald-500/30 text-emerald-500 hover:border-emerald-500 transition-colors">
              OK
            </button>
          </div>
        </div>

        <!-- Layer toggles -->
        <div class="p-4 border-b t-border">
          <div class="text-xs font-semibold uppercase tracking-widest t-text-sec mb-3">Layers</div>
          <div class="space-y-2.5">
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" data-type="streetlight" checked class="w-4 h-4 accent-yellow-400" />
              <span class="flex items-center gap-2 text-sm">
                <span class="w-3 h-3 rounded-full border-2 border-yellow-400 inline-block" style="background:rgba(250,204,21,0.3)"></span>
                Streetlights
              </span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" data-type="manhole" checked class="w-4 h-4 accent-slate-400" />
              <span class="flex items-center gap-2 text-sm">
                <span class="w-3 h-3 rounded-full border-2 border-slate-400 inline-block" style="background:rgba(148,163,184,0.3)"></span>
                Manholes
              </span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" data-type="road" checked class="w-4 h-4 accent-blue-500" />
              <span class="flex items-center gap-2 text-sm">
                <span class="w-3 h-3 rounded border-2 border-blue-500 inline-block" style="background:rgba(59,130,246,0.2)"></span>
                Roads
              </span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" data-type="tree" checked class="w-4 h-4 accent-emerald-500" />
              <span class="flex items-center gap-2 text-sm">
                <span class="w-3 h-3 rounded-full border-2 border-emerald-500 inline-block" style="background:rgba(16,185,129,0.2)"></span>
                Trees
              </span>
            </label>
          </div>
        </div>

        <!-- Asset card (populated by JS on click) -->
        <div id="asset-card" class="hidden border-b t-border"></div>

        <!-- Chatbot -->
        <div class="p-4 flex flex-col gap-3">
          <div class="text-xs font-semibold uppercase tracking-widest t-text-sec">Ask MuniTwin</div>

          <div id="chat-chips" class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1" style="scrollbar-width:none;"></div>

          <div id="chat-messages" class="flex flex-col gap-2 min-h-[80px]">
            <div class="chat-msg-bot">
              Hello! Click an asset on the map to inspect it, or ask me something about Millbrook's infrastructure.
            </div>
          </div>

          <form id="chat-form" class="flex gap-2 mt-1">
            <input id="chat-input" type="text" placeholder="Ask a question…"
              class="flex-1 t-input rounded px-3 py-2 text-sm focus:outline-none" />
            <button type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
            </button>
          </form>
        </div>

      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/theme.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
